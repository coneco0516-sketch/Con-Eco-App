<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Analytics</title>
    <link rel="stylesheet" href="VendorAnalytics.css">
</head>

<body>

<!-- HEADER -->
<header>
    <div class="top-bar">
        <a href="VendorDashboard.html" class="back">← Back</a>

        <div class="title">
            <h1>ConEco</h1>
            <p>Analytics Dashboard</p>
        </div>
    </div>
</header>

<hr>

<!-- MAIN CONTAINER -->
<main class="container">

    <!-- LEFT SECTION -->
    <section class="left">

        <!-- TOTAL ORDERS -->
        <div class="card orders">
            <h3>Total Orders</h3>

            <!-- FILTER -->
            <select class="filter">
                <option>Today</option>
                <option>This Week</option>
                <option>This Month</option>
            </select>

            <div class="box">Line Chart</div>
        </div>

        <!-- AI FORECAST -->
        <div class="card forecast">
            <h4>Demand Forecast</h4>
            <p>Using AI/ML</p>
            <div class="box">Forecast Graph</div>
        </div>

    </section>

    <!-- CENTER SECTION -->
    <section class="center">

        <div class="card rating">
            <h3>Rating / Review</h3>

            <div class="rating-box">
                ⭐ 4.5 / 5  
                <br>
                <small>Based on 120 reviews</small>
            </div>

        </div>

    </section>

    <!-- RIGHT SECTION -->
    <section class="right">

        <div class="card performance">
            <h3>Product Performance</h3>
            <p>On recent basis</p>

            <div class="box">Pie Chart</div>
        </div>

    </section>

</main>

<hr>

<!-- FOOTER -->
<footer>
    <p>&copy; 2026 ConEco. All rights reserved.</p>
    <p>
        <a href="FAQ.html">FAQ</a> |
        <a href="Terms.html">Terms</a> |
        <a href="Privacy.html">Privacy</a>
    </p>
</footer>

</body>
</html>
