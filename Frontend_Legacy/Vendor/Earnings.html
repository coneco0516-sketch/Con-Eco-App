<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Earnings</title>
    <link rel="stylesheet" href="Earnings.css">
</head>

<body>

<!-- HEADER -->
<header>
    <h1>Vendor Earnings</h1>
</header>

<hr>

<!-- NAVBAR -->
<nav>
    <ul>
        <li><a href="VendorDashboard.html">Dashboard</a></li>
        <li><a href="Catalogue.html">Catalogue</a></li>
        <li><a href="VendorOrderSummary.html">Orders</a></li>
        <li><a href="VendorAnalytics.html">Analytics</a></li>
        <li><a href="Earnings.html">Earnings</a></li>
    </ul>

    <p>
        <a href="VendorProfile.html">My Profile</a> | 
        <a href="javascript:void(0)" onclick="logout()">Logout</a>
    </p>
</nav>

<hr>

<!-- MAIN -->
<main>

    <!-- SUMMARY CARDS -->
    <section class="summary" id="earnings-summary">
    </section>

    <!-- TRANSACTION HISTORY -->
    <section class="transactions">

        <h2>Transaction History</h2>

        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Order ID</th>
                    <th>Type</th>
                    <th>Amount (₹)</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="earnings-body">
            </tbody>

        </table>

    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('http://localhost:8000/api/vendor/earnings', {credentials: 'include'})
            .then(res => res.json())
            .then(data => {
                if(data.status === 'not_logged_in') {
                    document.getElementById('earnings-summary').innerHTML = '<p>Please log in.</p>';
                    return;
                }
                
                let s = data.stats;
                document.getElementById('earnings-summary').innerHTML = `
                    <div class="card">
                        <h3>Total Earnings</h3>
                        <p>₹ ${s.total}</p>
                    </div>
                    <div class="card">
                        <h3>This Month</h3>
                        <p>₹ ${s.this_month}</p>
                    </div>
                    <div class="card">
                        <h3>Pending Payments</h3>
                        <p>₹ ${s.pending}</p>
                    </div>
                `;
                
                let html = '';
                data.transactions.forEach(t => {
                    let cls = '';
                    if(t.status === 'Pending') cls = 'pending';
                    else if(t.status === 'Completed' || t.status === 'Paid') cls = 'success';
                    else if(t.status === 'Failed' || t.status === 'Cancelled') cls = 'pending'; // or separate color
                    
                    html += `
                    <tr>
                        <td>${t.date}</td>
                        <td>#ORD${t.order_id}</td>
                        <td>${t.order_type}</td>
                        <td>${t.amount}</td>
                        <td class="${cls}">${t.status}</td>
                    </tr>
                    `;
                });
                document.getElementById('earnings-body').innerHTML = html;
            });
        });
    </script>

</main>

<hr>

</body>
</html>
