<body>
    <script>
        function togglePasswordVisibility(inputId, btn) {
            let input = document.getElementById(inputId);
            input.type = "text";
            btn.innerText = "👁️";
            setTimeout(() => {
                input.type = "password";
                btn.innerText = "👁️‍🗨️";
            }, 5000);
        }
    </script>
    <section>
        <h2>Login</h2>
        <form action="submit_login_form.php" method="post">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="password">Password:</label>
            <div style="position: relative; display: inline-block;">
                <input type="password" id="password" name="password" required style="padding-right: 30px; box-sizing: border-box;">
                <button type="button" onclick="togglePasswordVisibility('password', this)" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0; font-size: 1.1em; opacity: 0.7;">👁️‍🗨️</button>
            </div><br><br>

            <!-- Verify OTP need to be added --><br><br>

            <button type="submit">Login</button>
        </form>

        <p>Don't have an account?<a href="Register.html">Register here</a></p>
    </section>
</body>
