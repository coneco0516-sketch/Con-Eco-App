<!-- MAIN -->
<main>

    <!-- ADD NEW ITEM -->
    <!-- ADD NEW ITEM -->
    <section class="form-section">
        <h2>Add Product / Service</h2>

        <form id="add-item-form">

            <label>Category:</label>
            <select id="cat-category" required>
                <option value="">Select Category</option>
                <option>Construction Materials</option>
                <option>Interior Services</option>
                <option>Electrical</option>
                <option>Plumbing</option>
                <option>Labor Services</option>
            </select>

            <label>Type:</label>
            <select id="cat-type" required>
                <option value="">Select Type</option>
                <option>Product</option>
                <option>Service</option>
            </select>

            <label>Name:</label>
            <input type="text" id="cat-name" placeholder="Enter product/service name" required>

            <label>Description:</label>
            <textarea id="cat-desc" placeholder="Enter details"></textarea>

            <label>Price (₹):</label>
            <input type="number" id="cat-price" placeholder="Enter price" required>

            <label>Upload Image:</label>
            <input type="file" id="cat-img">

            <button type="submit" class="add-btn">Add Item</button>

        </form>
    </section>

    <!-- LIST OF ITEMS -->
    <section class="list-section">
        <h2>Your Catalogue</h2>

        <div class="card-container" id="catalogue-container">
        </div>

    </section>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            loadCatalogue();

            document.getElementById('add-item-form').addEventListener('submit', function(e) {
                e.preventDefault();
                let formData = new FormData();
                formData.append('category', document.getElementById('cat-category').value);
                formData.append('type', document.getElementById('cat-type').value);
                formData.append('name', document.getElementById('cat-name').value);
                formData.append('description', document.getElementById('cat-desc').value);
                formData.append('price', document.getElementById('cat-price').value);
                formData.append('image', document.getElementById('cat-img').files[0]); // Add this line

                // Use FormData for implicit file handling
                fetch('http://localhost:8000/api/vendor/catalogue', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success') {
                        alert("Item added successfully!");
                        document.getElementById('add-item-form').reset();
                        loadCatalogue();
                    } else {
                        alert("Error adding item");
                    }
                });
            });
        });

        function loadCatalogue() {
            fetch('http://localhost:8000/api/vendor/catalogue', {credentials: 'include'})
            .then(res => res.json())
            .then(data => {
                if(data.status === 'not_logged_in') {
                    document.getElementById('catalogue-container').innerHTML = '<p>Please log in to manage your catalogue.</p>';
                    return;
                }
                
                let html = '';
                if(data.items.length === 0) {
                    html += '<p>Your catalogue is empty.</p>';
                } else {
                    data.items.forEach(item => {
                        let cls = item.type.toLowerCase();
                        html += `
                        <div class="card">
                            <h3>${item.name}</h3>
                            <p>₹${item.price}</p>
                            <p class="type ${cls}">${item.type}</p>
                            <div class="actions">
                                <button class="delete" onclick="deleteItem(${item.id}, '${item.type}')">Delete</button>
                            </div>
                        </div>
                        `;
                    });
                }
                document.getElementById('catalogue-container').innerHTML = html;
            });
        }

        function deleteItem(id, type) {
            if(!confirm("Are you sure you want to delete this item?")) return;
            fetch('http://localhost:8000/api/vendor/catalogue?id=' + encodeURIComponent(id) + '&type=' + encodeURIComponent(type), {
                method: 'DELETE',
                credentials: 'include'
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') loadCatalogue();
            });
        }
    </script>

</main>
