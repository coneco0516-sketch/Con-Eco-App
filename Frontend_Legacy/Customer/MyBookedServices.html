<body>

</header>

<hr>

<!-- NAVBAR -->
<nav>
    <ul>
        <li><a href="CustomerDashboard.html">Dashboard</a></li>

        <li><a href="MyBookedServices.html">My Services</a></li>
    </ul>
</nav>

<hr>

<!-- MAIN -->
<main>

    <!-- SERVICE CARD -->
<script>
    document.addEventListener("DOMContentLoaded", () => {
        fetch('http://localhost:8000/api/customer/my_services', {credentials: 'include'})
        .then(res => res.json())
        .then(data => {
            if(data.status === 'not_logged_in') {
                document.querySelector('main').innerHTML = '<h2 style="padding:20px; color:red;">Please log in to view your booked services.</h2>';
                return;
            }
            
            let html = '';
            if(data.services.length === 0) {
                html += '<p style="padding:20px;">You have no booked services yet.</p>';
            } else {
                data.services.forEach(s => {
                    let statusClass = s.status.toLowerCase();
                    html += `
                    <div class="service-card">
                        <div class="service-header">
                            <h3>Booking ID: #SRV${s.order_id}</h3>
                            <span class="status ${statusClass}">${s.status}</span>
                        </div>
                        <p><strong>Service:</strong> ${s.service_name}</p>
                        <p><strong>Vendor:</strong> ${s.vendor_name}</p>
                        <p><strong>Date:</strong> ${s.date}</p>
                        <p><strong>Time:</strong> Not specified</p>
                        <h4>Amount: ₹${s.amount}</h4>
                    </div>
                    `;
                });
            }
            document.querySelector('main').innerHTML = html;
        });
    });
</script>

</main>
