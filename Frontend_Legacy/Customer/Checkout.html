<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="Checkout.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>Checkout</h1>
    </header>

    <hr>

    <!-- NAVBAR -->
    <nav>
        <ul>
            <li><a href="CustomerDashboard.html">Dashboard</a></li>
            <li><a href="Products.html">Products</a></li>
            <li><a href="Services.html">Services</a></li>
            <li><a href="Cart.html">Cart</a></li>
        </ul>

        <p>
            <a href="CustomerProfile.html">My Profile</a> |
            <a href="javascript:void(0)" onclick="logout()">Logout</a>
        </p>
    </nav>

    <hr>

    <!-- MAIN -->
    <main class="container">

        <!-- LEFT SIDE -->
        <section class="checkout-form">

            <h2>Shipping Details</h2>

            <form>

                <label>Full Name</label>
                <input type="text" name="full_name" required>

                <label>Phone Number</label>
                <input type="tel" name="phone" required>

                <label>Address</label>
                <input type="text" name="address" required>

                <label>City</label>
                <input type="text" name="city" required>

                <label>State</label>
                <input type="text" name="state" required>

                <label>Pincode</label>
                <input type="text" name="pincode" required>

                <h3>Payment Method</h3>

                <div class="payment-options">
                    <label><input type="radio" name="payment" value="COD" checked> Cash on Delivery</label>
                    <label><input type="radio" name="payment" value="UPI"> UPI</label>
                    <label><input type="radio" name="payment" value="Card"> Card</label>
                </div>

            </form>

        </section>

        <!-- RIGHT SIDE -->
        <section class="order-summary">

            <h2>Order Summary</h2>

            <div id="checkout-summary"></div>

            <hr>

            <div class="total">
                <h3>Total</h3>
                <h3 id="checkout-total">₹0</h3>
            </div>

            <!-- BUTTON -->
            <button class="place-order" onclick="submitCheckout()">Place Order</button>

        </section>

    </main>

    <hr>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 ConEco. All rights reserved.</p>
        <p>
            <a href="FAQ.html">FAQ</a> |
            <a href="Terms.html">Terms</a> |
            <a href="Privacy.html">Privacy</a>
        </p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('http://localhost:8000/api/customer/cart', { credentials: 'include' })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'not_logged_in') {
                        window.location.href = '../Main/Login.html';
                        return;
                    }

                    if (!data.items || data.items.length === 0) {
                        document.getElementById('checkout-summary').innerHTML = '<p>Your cart is empty.</p>';
                        return;
                    }

                    let html = '';
                    data.items.forEach(i => {
                        html += `<p>${i.name} (x${i.quantity}) <span>₹${i.price * i.quantity}</span></p>`;
                    });
                    html += `<hr><p class="total">Total <span style="color:red">₹${data.total}</span></p>`;
                    document.getElementById('checkout-summary').innerHTML = html;
                    document.getElementById('checkout-total').innerText = '₹' + data.total;
                });
        });

        function submitCheckout() {
            const form = document.querySelector('form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const payload = {
                address: form.querySelector('[name="address"]').value,
                city: form.querySelector('[name="city"]').value,
                state: form.querySelector('[name="state"]').value,
                payment_method: document.querySelector('input[name="payment"]:checked').value
            };

            fetch('http://localhost:8000/api/customer/checkout', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    alert("Order Placed Successfully!");
                    window.location.href = "OrderSuccess.html";
                } else {
                    alert("Error: " + data.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert("Checkout failed. Please check your connection.");
            });
        }
    </script>

    <script src="../shared/auth.js"></script>
</body>
</html>
