<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile</title>
    <link rel="stylesheet" href="AdminProfile.css">
</head>

<body>

<!-- HEADER -->
<header>
    <h1>ConEco - Admin Panel</h1>
    <div class="top-bar">
        <h2>Admin Profile</h2>
        <a href="javascript:void(0)" onclick="logout()" class="logout">Logout</a>
    </div>
</header>

<hr>

<!-- MAIN CONTAINER -->
<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h3>Control Center</h3>
        <ul>
            <li><a href="AdminDashboard.html">Dashboard</a></li>
            <li><a href="VendorVerification.html">Vendor Verification</a></li>
            <li><a href="CustomerVerification.html">Customer Verification</a></li>
            <li><a href="AdminOrderSummary.html">Orders</a></li>
            <li><a href="Payments.html">Payments</a></li>
            <li><a href="PlatformSettings.html">Settings</a></li>
        </ul>
    </aside>

    <!-- PROFILE CONTENT -->
    <main class="profile">

        <div class="profile-card">
            <h2>Admin Profile</h2>

            <form>

                <!-- BASIC INFO -->
                <label>Name:</label>
                <input type="text" value="Admin Name" name="name" required>

                <label>Email:</label>
                <input type="email" value="admin@coneco.com" name="email" readonly>

                <label>Phone:</label>
                <input type="tel" value="9999999999" name="phone" required>

                <!-- ROLE -->
                <label>Role:</label>
                <input type="text" value="Super Admin" readonly>

                <!-- SECURITY -->
                <h3>Security Settings</h3>

                <label>New Password:</label>
                <input type="password" id="password" placeholder="Enter new password">

                <label>Confirm Password:</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password">

                <p id="error"></p>

                <!-- BUTTONS -->
                <div class="btn-group">
                    <button type="submit" class="save-btn">Save Changes</button>
                    <button type="reset" class="cancel-btn">Cancel</button>
                </div>

            </form>
        </div>

    </main>

</div>

<hr>

<!-- FOOTER -->
<footer>
    <p>© 2026 ConEco. All Rights Reserved.</p>
    <p>
        <a href="FAQ.html">FAQ</a> |
        <a href="Terms.html">Terms</a> |
        <a href="Privacy.html">Privacy</a>
    </p>
</footer>

<script src="../shared/auth.js"></script>
</body>
</html>
