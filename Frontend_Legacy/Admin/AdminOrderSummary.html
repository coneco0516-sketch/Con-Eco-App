<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Order Summary</title>
    <link rel="stylesheet" href="AdminOrderSummary.css">
</head>

<body>

<header>
    <h1>ConEco - Order Management</h1>
</header>
<hr>
<nav>
    <ul>
        <li><a href="AdminDashboard.html">Dashboard</a></li>
        <li><a href="VendorVerification.html">Vendor Verification</a></li>
        <li><a href="CustomerVerification.html">Customer Verification</a></li>
        <li><a href="Payments.html">Payments</a></li>
        <li><a href="javascript:void(0)" onclick="logout()">Logout</a></li>
    </ul>
</nav>

<hr>

<main>
    <h2>All Orders Overview</h2>
    <section class="table-section">
        <table border="1" width="100%" style="border-collapse: collapse; text-align: left;">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Vendor</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="order-table-body">
            </tbody>
        </table>
    </section>

    <script src="../shared/auth.js"></script>
    <script>
        function loadOrders() {
            authFetch('http://localhost:8000/api/admin/orders')
            .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        let html = '';
                        data.orders.forEach(order => {
                            let statusClass = order.status.toLowerCase();
                            html += `
                        <tr>
                            <td style="padding: 10px;">#${order.order_id}</td>
                            <td style="padding: 10px;">${order.customer_name}</td>
                            <td style="padding: 10px;">${order.vendor_name}</td>
                            <td style="padding: 10px;">${order.order_type}</td>
                            <td style="padding: 10px;">₹${order.amount}</td>
                            <td style="padding: 10px;"><span class="status ${statusClass}">${order.status}</span></td>
                            <td style="padding: 10px;">${order.date}</td>
                        </tr>
                        `;
                        });
                        document.getElementById('order-table-body').innerHTML = html || '<tr><td colspan="7" style="padding:20px; text-align:center;">No orders found.</td></tr>';
                    }
                })
                .catch(err => console.error("Error loading orders:", err));
        }

        window.onload = loadOrders;
    </script>
</main>

</body>
</html>
