# render.yaml - ConEco Full-Stack Deployment Configuration
# Deploy this entire project to Render.com with one click

services:
  # ── FastAPI Backend ──────────────────────────────────────────────
  - type: web
    name: coneco-backend
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_HOST
        sync: false          # Supabase Host (e.g. aws-0-us-east-1.pooler.supabase.com)
      - key: DB_NAME
        sync: false          # Supabase DB Name (usually 'postgres')
      - key: DB_USER
        sync: false          # Supabase DB User (usually 'postgres')
      - key: DB_PASS
        sync: false          # Supabase DB Password
      - key: DB_PORT
        value: "5432"
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false          # Your Vercel frontend URL
